<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tiesverse Foundation - India's Leading Youth-Led Think Tank" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Tiesverse Foundation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* 1. Global Reset to hide default mouse on Desktop */
      @media (min-width: 769px) {
        * {
          cursor: none !important;
        }

        /* Ensure interactive elements don't trigger the default 'pointer' hand */
        a, button, input, textarea, [role="button"], .team-card-wrapper {
          cursor: none !important;
        }
      }

      /* 2. Standard behaviors for Mobile (Touchscreens) */
      @media (max-width: 768px) {
        * {
          cursor: auto !important;
        }
        a, button {
          cursor: pointer !important;
        }
      }

      /* 3. Smooth Body Background to prevent white flashes during load */
      body {
        margin: 0;
        background-color: #050505;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-client@2"></script>
  </body>
</html>
